<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="AgriScope - Agricultural Intelligence Platform for Field Monitoring and Crop Analysis"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>SentinelFarm</title>
    <div id="cropResults"></div>
    <script>
async function loadCropRecommendations(formData) {

    const response = await fetch("http://localhost:5000/api/crop-recommendations", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(formData)
    });

    const data = await response.json();

    displayCrops(data.recommendations);
}

function displayCrops(crops) {

    const resultsDiv = document.getElementById("cropResults");

    if (!crops || crops.length === 0) {
        resultsDiv.innerHTML = "<p>No recommendations found.</p>";
        return;
    }

    let html = "<h3>Recommended Crops</h3>";

    crops.forEach(crop => {
        html += `
            <div style="padding:15px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
                <h4>${crop.rank}. ${crop.name}</h4>
                <p>Confidence: ${crop.confidence}%</p>
            </div>
        `;
    });

    resultsDiv.innerHTML = html;
}
</script>
    
    <!-- Single Page Application redirect script for proper routing -->
    <script>
      // Check if we're being served from a direct URL access
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>

    <div id="root"></div>

</html>
